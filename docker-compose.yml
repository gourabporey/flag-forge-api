version: "3.8"
services:
  postgres:
    image: postgres:16
    container_name: flagforge-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: flagforge
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d flagforge"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: flagforge-redis
    ports:
      - "6379:6379"

  api:
    build: .
    container_name: flagforge-api
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnectionString: Host=postgres;Port=5432;Database=flagforge;Username=postgres;Password=postgres
      REDIS_HOST: redis
